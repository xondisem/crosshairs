<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Мои прицелы VALORANT</title>
    <link rel="icon" type="image/x-icon" href="SiteIcon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="copyToast" class="copy-toast" role="status" aria-live="polite">Прицел скопирован</div>

<header class="top">
    <div>
        <h1>Мои прицелы VALORANT</h1>
        <p class="subtitle"></p>
    </div>

    <button id="themeToggle" title="Сменить тему">🌙</button>
</header>

<main class="crosshairs">

    <div class="card">
        <div class="card-content">
            <div class="card-text">
                <h2>Крестик</h2>
            </div>

            <div class="crosshair-preview">
                <img src="Images/Krestik.png" alt="Крестик">
            </div>

            <button class="preview-btn" onclick="openPreview('Images/preview.gif')" title="Предпросмотр">
                ▶
                
            </button>
        </div>

        <button onclick="copy(this)" data-code="0;p;0;s;1;P;u;000000FF;h;0;f;0;0l;4;0v;4;0o;0;0a;1;0f;0;1b;0;A;o;1;d;1;0b;0;1b;0;S;c;0;s;0.611;o;1">
            Скопировать
        </button>
    </div>

    <div class="card">
        <div class="card-content">
            <div class="card-text">
                <h2>Точка</h2>
            </div>

            <div class="crosshair-preview">
                <img src="Images/Tochka.png" alt="Точка">
            </div>

            <button class="preview-btn" onclick="openPreview('Images/preview.gif')" title="Предпросмотр">
                ▶
                
            </button>
        </div>

        <button onclick="copy(this)" data-code="0;p;0;s;1;P;u;000000FF;o;1;d;1;f;0;0b;0;1b;0;A;o;1;d;1;0b;0;1b;0;S;c;0;s;0.61;o;1">
            Скопировать
        </button>
    </div>

    <div class="card">
        <div class="card-content">
            <div class="card-text">
                <h2>Калм аим</h2>
            </div>

            <div class="crosshair-preview">
                <img src="Images/Calm_aim.png" alt="Калм аим">
            </div>

            <button class="preview-btn" onclick="openPreview('Images/preview.gif')" title="Предпросмотр">
                ▶
                
            </button>
        </div>

        <button onclick="copy(this)" data-code="0;s;1;P;c;5;u;A52ABBFF;o;1;f;0;0l;2;0v;2;0o;2;0a;1;0f;0;1b;0;S;c;5;s;0.716;o;1">
            Скопировать
        </button>
    </div>

    <div class="card">
        <div class="card-content">
            <div class="card-text">
                <h2>Крестик с дыркой</h2>
            </div>

            <div class="crosshair-preview">
                <img src="Images/Krestik_s_dirkoy.png" alt="Крестик с дыркой">
            </div>

            <button class="preview-btn" onclick="openPreview('Images/preview.gif')" title="Предпросмотр">
                ▶
                
            </button>
        </div>

        <button onclick="copy(this)" data-code="0;p;0;s;1;P;u;000000FF;h;0;f;0;0l;4;0v;4;0o;2;0a;1;0f;0;1b;0;A;o;1;d;1;0b;0;1b;0;S;c;0;s;0.61;o;1">
            Скопировать
        </button>
    </div>

</main>


<div id="previewModal" class="preview-modal">
    <div class="preview-window">
        <button class="close-preview" onclick="closePreview()">✕</button>
        <img id="previewGif" src="" alt="Preview GIF">
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
